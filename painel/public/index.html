<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - Cooperativa Solidária</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1b7340; --secondary: #d63222; --bg: #f0f7f2; --white: #ffffff; --text: #2b332b; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 2rem; }
        .container { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
        .panel { background: var(--white); padding: 2rem; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 8px solid var(--primary); }
        h1, h2 { color: var(--primary); margin-top: 0; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; font-weight: 600; margin-bottom: 0.3rem; font-size: 0.9rem; }
        input, textarea { width: 100%; padding: 0.7rem; border: 2px solid #e1efe4; border-radius: 8px; font-size: 1rem; box-sizing: border-box; }
        .btn-submit { background: var(--primary); color: white; border: none; padding: 1rem; width: 100%; border-radius: 8px; font-weight: 700; cursor: pointer; }
        
        /* Lista de Produtos */
        .product-list { background: var(--white); padding: 2rem; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .product-item { display: flex; align-items: center; gap: 1rem; padding: 1rem 0; border-bottom: 1px solid #eee; }
        .product-item img { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; }
        .product-info { flex: 1; }
        .product-info h3 { margin: 0; font-size: 1rem; }
        .btn-delete { background: #fee2e2; color: #dc2626; border: none; padding: 0.5rem 1rem; border-radius: 6px; font-weight: 600; cursor: pointer; }
        .btn-delete:hover { background: #fecaca; }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; }
    </style>
</head>
<body>

<div class="loading-overlay" id="loader">
    <div style="text-align: center;">
        <div style="border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 10px;"></div>
        <p>Atualizando site...</p>
    </div>
</div>

<div class="container">
    <div class="panel">
        <h1>Novo Produto</h1>
        <form id="produtoForm">
            <div class="form-group"><label>Nome</label><input type="text" id="nome" required></div>
            <div class="form-group"><label>Foto</label><input type="file" id="foto" accept="image/*" required></div>
            <div class="form-group"><label>Descrição</label><textarea id="descricao" rows="2" required></textarea></div>
            <div class="form-group"><label>Preço</label><input type="text" id="preco" required placeholder="35,00"></div>
            <div class="form-group"><label>WhatsApp</label><input type="text" id="whatsapp" required placeholder="31996177729"></div>
            <button type="submit" class="btn-submit">Publicar no Site</button>
        </form>
    </div>

    <div class="product-list">
        <h2>Produtos Ativos</h2>
        <div id="listaProdutos">
            <!-- Produtos carregados aqui -->
        </div>
    </div>
</div>

<script>
    const form = document.getElementById('produtoForm');
    const listaDiv = document.getElementById('listaProdutos');
    const loader = document.getElementById('loader');

    async function carregarProdutos() {
        const res = await fetch('/api/produtos');
        const produtos = await res.json();
        listaDiv.innerHTML = produtos.map(p => `
            <div class="product-item">
                <img src="/../produtos/${p.foto}">
                <div class="product-info">
                    <h3>${p.nome}</h3>
                    <small>R$ ${p.preco}</small>
                </div>
                <button class="btn-delete" onclick="excluirProduto('${p.id}')">Excluir</button>
            </div>
        `).join('');
    }

    form.onsubmit = async (e) => {
        e.preventDefault();
        loader.style.display = 'flex';
        const formData = new FormData(form);
        formData.append('nome', document.getElementById('nome').value);
        formData.append('descricao', document.getElementById('descricao').value);
        formData.append('preco', document.getElementById('preco').value);
        formData.append('whatsapp', document.getElementById('whatsapp').value);
        formData.append('foto', document.getElementById('foto').files[0]);

        await fetch('/api/produtos', { method: 'POST', body: formData });
        form.reset();
        await carregarProdutos();
        loader.style.display = 'none';
        alert('Produto publicado!');
    };

    async function excluirProduto(id) {
        if (!confirm('Tem certeza que deseja remover este produto?')) return;
        loader.style.display = 'flex';
        await fetch(\`/api/produtos/\${id}\`, { method: 'DELETE' });
        await carregarProdutos();
        loader.style.display = 'none';
    }

    carregarProdutos();
</script>
</body>
</html>
