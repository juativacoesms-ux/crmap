<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - Cooperativa Solidária</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1b7340;
            --secondary: #d63222;
            --bg: #f0f7f2;
            --white: #ffffff;
            --text: #2b332b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .panel {
            background: var(--white);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            border-top: 8px solid var(--primary);
        }

        h1 {
            color: var(--primary);
            text-align: center;
            margin-bottom: 2rem;
            font-size: 1.8rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        input, textarea {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid #e1efe4;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn-submit {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 1rem;
            width: 100%;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            margin-top: 1rem;
        }

        .btn-submit:hover {
            background-color: #145a32;
            transform: translateY(-2px);
        }

        .status {
            margin-top: 1rem;
            text-align:center;
            font-weight: 600;
            padding: 1rem;
            border-radius: 8px;
            display: none;
        }

        .success { background: #d4edda; color: #155724; display: block; }
        .error { background: #f8d7da; color: #721c24; display: block; }

        .loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
    </style>
</head>
<body>

<div class="loading-overlay" id="loader">
    <div style="text-align: center;">
        <div style="border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 10px;"></div>
        <p>Publicando no site... aguarde...</p>
    </div>
</div>

<div class="panel">
    <h1>Postar Novo Produto</h1>
    <form id="produtoForm">
        <div class="form-group">
            <label>Nome do Produto</label>
            <input type="text" id="nome" required placeholder="Ex: Mel Silvestre 500g">
        </div>

        <div class="form-group">
            <label>Foto do Produto</label>
            <input type="file" id="foto" accept="image/*" required>
        </div>

        <div class="form-group">
            <label>Descrição</label>
            <textarea id="descricao" rows="3" required placeholder="Conte detalhes sobre o produto..."></textarea>
        </div>

        <div class="form-group">
            <label>Preço (R$)</label>
            <input type="text" id="preco" required placeholder="Ex: 35,00">
        </div>

        <div class="form-group">
            <label>WhatsApp do Fornecedor (com DDD)</label>
            <input type="text" id="whatsapp" required placeholder="Ex: 31996177729">
        </div>

        <button type="submit" class="btn-submit">Publicar no Site</button>
    </form>
    <div id="status" class="status"></div>
</div>

<style>
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>

<script>
    const form = document.getElementById('produtoForm');
    const statusDiv = document.getElementById('status');
    const loader = document.getElementById('loader');

    form.onsubmit = async (e) => {
        e.preventDefault();
        
        loader.style.display = 'flex';
        statusDiv.className = 'status';
        statusDiv.innerHTML = '';

        const formData = new FormData();
        formData.append('nome', document.getElementById('nome').value);
        formData.append('descricao', document.getElementById('descricao').value);
        formData.append('preco', document.getElementById('preco').value);
        formData.append('whatsapp', document.getElementById('whatsapp').value);
        formData.append('foto', document.getElementById('foto').files[0]);

        try {
            const response = await fetch('/api/produtos', {
                method: 'POST',
                body: formData
            });

            const result = await response.json();
            
            if (result.success) {
                statusDiv.classList.add('success');
                statusDiv.innerHTML = '🎉 ' + result.message;
                form.reset();
            } else {
                statusDiv.classList.add('error');
                statusDiv.innerHTML = '❌ Erro: ' + result.message;
            }
        } catch (error) {
            statusDiv.classList.add('error');
            statusDiv.innerHTML = '❌ Erve no servidor. Verifique se o programa está rodando.';
        } finally {
            loader.style.display = 'none';
        }
    };
</script>

</body>
</html>
