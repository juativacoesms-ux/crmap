<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - Cooperativa Solidária</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1b7340; --secondary: #d63222; --bg: #f0f7f2; --white: #ffffff; --text: #2b332b; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 1rem; }
        .login-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:var(--primary); display:flex; justify-content:center; align-items:center; z-index:2000; }
        .login-box { background:white; padding:2rem; border-radius:12px; text-align:center; box-shadow:0 10px 25px rgba(0,0,0,0.2); }
        .container { max-width: 1000px; margin: 0 auto; display:none; flex-direction: column; gap: 2rem; }
        .tabs { display: flex; gap: 1rem; margin-bottom: 2rem; }
        .tab-btn { background: #ddd; color: #555; padding: 0.8rem 1.5rem; border-radius: 8px; cursor: pointer; flex: 1; text-align: center; font-weight: 600; }
        .tab-btn.active { background: var(--primary); color: white; }
        .view-section { display: none; }
        .view-section.active { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
        .full-section { display: none; background: white; padding: 1.5rem; border-radius: 16px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border-top: 6px solid var(--primary); }
        .full-section.active { display: block; }
        .panel, .product-list { background: var(--white); padding: 1.5rem; border-radius: 16px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border-top: 6px solid var(--primary); }
        input, textarea { width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 1rem; font-family: inherit; }
        button { background: var(--primary); color: white; border: none; padding: 1rem; width: 100%; border-radius: 8px; font-weight: 700; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { text-align: left; padding: 0.8rem; border-bottom: 1px solid #eee; }
        th { color: var(--primary); }
        .status-badge { padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.8rem; font-weight: bold; }
        .status-approved { background: #dcfce7; color: #166534; }
        .status-pending { background: #fef9c3; color: #854d0e; }
        .product-item { display: flex; align-items: center; gap: 1rem; padding: 0.8rem 0; border-bottom: 1px solid #eee; }
        .product-item img { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; }
        .btn-delete { background: #fee2e2; color: #dc2626; padding: 0.4rem 0.8rem; border-radius: 4px; font-size: 0.8rem; width: auto; }
        #loader { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:rgba(0,0,0,0.7); color:white; padding:2rem; border-radius:12px; z-index:3000; }
        @media(max-width: 800px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div id="loader">Aguardando...</div>

<div class="login-overlay" id="loginOverlay">
    <div class="login-box">
        <h2>Painel CRMAP</h2>
        <p>Digite a senha para acessar:</p>
        <input type="password" id="senhaAcesso" placeholder="Sua senha...">
        <button onclick="verificarSenha()">Entrar</button>
    </div>
</div>

<div class="container" id="mainContainer">
    <div class="tabs">
        <div class="tab-btn active" onclick="switchTab('produtos')">Gerenciar Produtos</div>
        <div class="tab-btn" onclick="switchTab('pagamentos')">Relatório de Pagamentos</div>
    </div>

    <!-- Seção de Produtos -->
    <div id="section-produtos" class="view-section active">
        <div class="panel">
            <h2>Novo Produto</h2>
            <form id="produtoForm">
                <label>Nome</label><input type="text" id="nome" required>
                <label>Descrição</label><textarea id="descricao" rows="2" required></textarea>
                <label>Preço (R$)</label><input type="text" id="preco" required>
                <label>WhatsApp do Fornecedor</label><input type="text" id="whatsapp" required>
                <label>Foto do Produto</label><input type="file" id="foto" accept="image/*" required>
                <button type="submit">Publicar Agora</button>
            </form>
        </div>

        <div class="product-list">
            <h2>Produtos Ativos</h2>
            <div id="listaProdutos"></div>
        </div>
    </div>

    <!-- Seção de Pagamentos -->
    <div id="section-pagamentos" class="full-section">
        <h2>Controle de Pagamentos (Carteirinhas)</h2>
        <p>Aqui você acompanha quem pagou e gerou a carteirinha.</p>
        <table>
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Nome</th>
                    <th>Credencial</th>
                    <th>Valor</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="listaPagamentos">
                <tr><td colspan="5" style="text-align:center">Carregando dados...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://qzjvzbvoxwhggvadaroq.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_LAlIOr94LYGTN8-BvHuT1A_BC1xScEQ'; 
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    let senhaGeral = "";

    function verificarSenha() {
        const pass = document.getElementById('senhaAcesso').value;
        if (pass === '270797crmap*') {
            senhaGeral = pass;
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainContainer').style.display = 'flex';
            carregarProdutos();
            carregarPagamentos();
        } else {
            alert('Senha incorreta!');
        }
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.view-section, .full-section').forEach(s => s.classList.remove('active'));
        
        event.target.classList.add('active');
        document.getElementById('section-' + tab).classList.add('active');
    }

    async function carregarPagamentos() {
        const { data } = await supabaseClient.from('pagamentos_carteirinha').select('*').order('created_at', { ascending: false });
        const lista = document.getElementById('listaPagamentos');
        if (!data || data.length === 0) {
            lista.innerHTML = '<tr><td colspan="5" style="text-align:center">Nenhum pagamento registrado.</td></tr>';
            return;
        }
        lista.innerHTML = data.map(p => `
            <tr>
                <td>${new Date(p.created_at).toLocaleDateString()}</td>
                <td>${p.nome_pagador}</td>
                <td>${p.numero_credencial}</td>
                <td>R$ ${p.valor}</td>
                <td><span class="status-badge status-${p.status}">${p.status === 'approved' ? 'Pago' : 'Pendente'}</span></td>
            </tr>
        `).join('');
    }

    async function carregarProdutos() {
        const { data } = await supabaseClient.from('produtos').select('*').order('created_at', { ascending: false });
        const lista = document.getElementById('listaProdutos');
        lista.innerHTML = data.map(p => `
            <div class="product-item">
                <img src="${p.foto_url}">
                <div style="flex:1"><strong>${p.nome}</strong><br><small>R$ ${p.preco}</small></div>
                <button class="btn-delete" onclick="excluirProduto(${p.id})">Excluir</button>
            </div>
        `).join('');
    }

    document.getElementById('produtoForm').onsubmit = async (e) => {
        e.preventDefault();
        const loader = document.getElementById('loader');
        loader.style.display = 'block';

        try {
            const fotoFile = document.getElementById('foto').files[0];
            const fileName = Date.now() + '-' + fotoFile.name;
            
            // 1. Upload da Foto
            const { data: uploadData, error: uploadError } = await supabaseClient.storage
                .from('fotos-produtos')
                .upload(fileName, fotoFile);

            if (uploadError) throw uploadError;

            // 2. Pegar URL Pública
            const { data: { publicUrl } } = supabaseClient.storage
                .from('fotos-produtos')
                .getPublicUrl(fileName);

            // 3. Chamar Função Segura (RPC) no Supabase
            const { data: res, error: rpcError } = await supabaseClient.rpc('gerenciar_produto', {
                p_acao: 'inserir',
                p_senha: senhaGeral,
                p_nome: document.getElementById('nome').value,
                p_descricao: document.getElementById('descricao').value,
                p_preco: document.getElementById('preco').value,
                p_whatsapp: document.getElementById('whatsapp').value,
                p_foto_url: publicUrl
            });

            if (rpcError) throw rpcError;
            if (!res.success) alert(res.message);
            
            document.getElementById('produtoForm').reset();
            await carregarProdutos();
        } catch (err) {
            alert('Erro ao publicar: ' + err.message);
            console.error(err);
        } finally {
            loader.style.display = 'none';
        }
    };

    async function excluirProduto(id) {
        if (!confirm('Excluir este produto?')) return;
        const loader = document.getElementById('loader');
        loader.style.display = 'block';

        const { data: res, error } = await supabaseClient.rpc('gerenciar_produto', {
            p_acao: 'deletar',
            p_senha: senhaGeral,
            p_id: id
        });

        if (error) alert(error.message);
        await carregarProdutos();
        loader.style.display = 'none';
    }
</script>
</body>
</html>
