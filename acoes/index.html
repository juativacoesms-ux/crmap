<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ações & Eventos - CRMAP</title>
<meta name="description" content="Ações e eventos do CRMAP no território: oficinas, acolhimento, formação e fortalecimento das mulheres atingidas.">
<meta name="robots" content="index,follow">
<link rel="canonical" href="https://crmapoficial.org.br/acoes/">
<meta property="og:type" content="website">
<meta property="og:title" content="Ações & Eventos - CRMAP">
<meta property="og:description" content="Veja os principais momentos e ações do CRMAP no território.">
<meta property="og:url" content="https://crmapoficial.org.br/acoes/">
<meta property="og:image" content="https://crmapoficial.org.br/logonova.png">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  /* Reset & Base */
  *, *::before, *::after { box-sizing: border-box; }
  body {
    margin: 0; 
    font-family: 'Inter', sans-serif;
    background: #fdfdfb;
    color: #1e261e;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  h1, h2, h3, h4, h5, h6 {
    font-family: 'Montserrat', sans-serif;
    letter-spacing: -0.02em;
  }
  a { color: #1b7340; text-decoration: none; transition: all 0.3s ease; }
  img { max-width: 100%; height: auto; display: block; }
  .container { max-width: 1200px; padding: 0 1.5rem; margin: 0 auto; }

  header { 
    background: #ffffff; 
    padding: 1rem 0; 
    box-shadow: 0 2px 15px rgba(0,0,0,0.08); 
    position: sticky; 
    top: 0; 
    z-index: 1000; 
  }
  header .container { display: flex; justify-content: space-between; align-items: center; }
  header .container > a:first-of-type {
    display: inline-block;
    line-height: 0;
    background: transparent;
  }
  .logo-img {
    width: 130px;
    height: auto;
    display: block;
    object-fit: contain;
    background: transparent;
    filter: drop-shadow(0 1px 3px rgba(15, 48, 29, 0.12));
  }
  nav { display: flex; gap: 0.5rem; flex-wrap: wrap; }
  nav a.button-link { background: #e8f4ec; color: #1b7340; font-weight: 700; padding: 0.5rem 1rem; border-radius: 25px; font-size: 0.9rem; }
  nav a.button-link:hover { background: #1b7340; color: #ffffff; }

  /* Seção Hero */
  .hero-acoes {
    background: linear-gradient(rgba(15, 48, 29, 0.7), rgba(27, 115, 64, 0.7)), url('../images/acoes/hero_acoes.png');
    background-size: cover;
    background-position: center;
    color: white;
    padding: 10rem 1rem 8rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero-acoes h2 {
    font-size: 3.5rem;
    margin-bottom: 1.5rem;
    text-shadow: 0 2px 10px rgba(0,0,0,0.4);
  }
  .hero-acoes p {
    font-size: 1.4rem;
    max-width: 800px;
    margin: 0 auto;
    color: rgba(255,255,255,0.9);
  }

  section { padding: 8rem 0; overflow: hidden; }
  .section-title { 
    text-align: center; 
    font-size: 2.8rem; 
    margin-bottom: 3.5rem; 
    color: #1b7340; 
    position: relative; 
  }
  .section-title::after { content: ''; display: block; width: 60px; height: 4px; background: #d63222; margin: 0.8rem auto 0; border-radius: 2px; }
  
  .reveal {
    opacity: 0;
    transform: translateY(30px);
    transition: all 0.8s cubic-bezier(0.5, 0, 0, 1);
    visibility: hidden;
  }
  .reveal.active {
    opacity: 1;
    transform: translateY(0);
    visibility: visible;
  }

  /* Glassmorphism */
  .glass-card {
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.3);
    box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
  }

  .grid-gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 2.5rem; }
  .gallery-card { 
    border-radius: 12px; overflow: hidden; position: relative;
    transition: all 0.4s ease;
  }
  .gallery-card:hover { transform: translateY(-10px); }
  .gallery-card img { width: 100%; height: 350px; object-fit: cover; }
  .gallery-card .info {
    padding: 1.5rem;
    background: #ffffff;
    border-top: 4px solid #1b7340;
  }
  .gallery-card h4 { margin: 0 0 0.5rem; font-size: 1.4rem; color: #1b7340; }
  .gallery-card p { color: #4a5c4f; margin: 0; font-size: 1rem; }

  footer { background: #0f301d; color: #d0e6d8; text-align: center; padding: 2.5rem 1rem; }
</style>
</head>
<body>

<header>
  <div class="container">
    <a href="../index.html"><img src="../logonova.png" alt="Logo CRMAP" class="logo-img"></a>
    <nav>
      <a href="../index.html" class="button-link">Início</a>
      <a href="../produtos/index.html" class="button-link">Produtos</a>
      <a href="#" class="button-link" style="background:#1b7340; color:white;">Ações</a>
      <a href="../terreno/" class="button-link">Terreno</a>
    </nav>
  </div>
</header>

<main>
  <section class="hero-acoes">
    <div class="container reveal">
      <h2>Transformando Vidas na Prática</h2>
      <p>Nossas ações no território fortalecem vínculos e promovem a autonomia das mulheres atingidas.</p>
    </div>
  </section>

  <section>
    <div class="container">
      <h3 class="section-title">Nossos Momentos</h3>
      <div class="grid-gallery">
        
        <script>
          const gallery = document.querySelector('.grid-gallery');
          const descriptions = [
            "Oficina de Artesanato e União",
            "Atendimento e Apoio",
            "Planejamento de Ações Territoriais",
            "Roda de Conversa e Sororidade",
            "Encontro de Fortalecimento",
            "Workshop de Autonomia e Renda"
          ];

          for (let i = 1; i <= 6; i++) {
            gallery.innerHTML += `
              <div class="gallery-card glass-card reveal">
                <div class="image-box">
                  <img src="../images/acoes_blurred/acao_${i}.png" alt="Ação ${i}">
                </div>
                <div class="info">
                  <h4>${descriptions[i-1]}</h4>
                  <p>Ação realizada no território para fortalecer a luta das mulheres atingidas.</p>
                </div>
              </div>
            `;
          }
        </script>

      </div>
    </div>
  </section>
</main>

<footer>
  <div class="container">&copy; 2026 CRMAP – Centro de Referência das Mulheres Atingidas do Paraopeba.</div>
</footer>

<script>
  // ANIMATION: SCROLL REVEAL
  const revealCallback = (entries, observer) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('active');
      }
    });
  };

  const observer = new IntersectionObserver(revealCallback, {
    threshold: 0.1
  });

  document.querySelectorAll('.reveal').forEach(el => {
    observer.observe(el);
  });
</script>
</body>
</html>
